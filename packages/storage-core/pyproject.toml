[project]
name = "storage-core"
version = "0.1.0"
description = "Fixed-header append-only log + WAL-backed KV store"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storage_core"]