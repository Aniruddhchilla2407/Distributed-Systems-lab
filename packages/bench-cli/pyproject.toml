[project]
name = "bench-cli"
version = "0.1.0"
description = "Benchmarking CLI for kv-server and broker-server: concurrent load generation with latency percentile reporting"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "typer>=0.12",
    "rich>=13.7",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "pytest-asyncio>=0.23"]

[project.scripts]
bench-cli = "bench_cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_cli"]