[project]
name = "broker-core"
version = "0.1.0"
description = "Kafka-style topic/partition log broker built on storage-core's append-only log"
requires-python = ">=3.11"
dependencies = ["storage-core"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/broker_core"]