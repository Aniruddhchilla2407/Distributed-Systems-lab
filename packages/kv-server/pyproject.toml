[project]
name = "kv-server"
version = "0.1.0"
description = "HTTP server exposing storage-core's WAL-backed KVStore"
requires-python = ">=3.11"
dependencies = [
    "storage-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.6",
    "typer>=0.12",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "httpx2>=2.0"]

[project.scripts]
kv-server = "kv_server.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kv_server"]